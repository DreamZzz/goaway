name: Rollback Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
      target_release:
        description: Release ID to roll back to, or use previous
        required: true
        default: previous

jobs:
  rollback-backend:
    name: Roll back backend on ECS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-backend-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        env:
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${ECS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Roll back release via remote script
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
        run: |
          SSH_PORT="${ECS_PORT:-22}"
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${ECS_USER}@${ECS_HOST}" \
            "APP_ROOT=/opt/what-to-eat/backend SERVICE_NAME=what-to-eat-backend bash -s -- rollback ${{ inputs.target_release }}" \
            < ops/ecs/remote-release.sh

      - name: Rollback summary
        run: |
          {
            echo "### Backend rollback summary"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Target release: \`${{ inputs.target_release }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Smoke health checks
        run: |
          for attempt in $(seq 1 18); do
            ssh -p "${{ secrets.ECS_PORT || 22 }}" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" \
              "PUBLIC_BASE_URL=https://eat.868299.com LOCAL_BASE_URL=http://127.0.0.1:8081 SERVICE_NAME=what-to-eat-backend bash -s" \
              < ops/ecs/verify-backend.sh >/tmp/verify-backend.log 2>&1 && {
              cat /tmp/verify-backend.log
              echo "Smoke checks passed on attempt ${attempt}."
              exit 0
            }
            cat /tmp/verify-backend.log || true
            echo "Smoke checks failed on attempt ${attempt}; retrying..."
            sleep 10
          done
          echo "Smoke checks did not pass after retries." >&2
          exit 1
