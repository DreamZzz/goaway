name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
      git_ref:
        description: Git ref to deploy
        required: true
        default: main

jobs:
  deploy-backend:
    name: Deploy backend to ECS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-backend-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Maven 3.9.9
        run: |
          MAVEN_VERSION="3.9.9"
          curl -fsSL "https://archive.apache.org/dist/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/apache-maven-${MAVEN_VERSION}/bin" >> "${GITHUB_PATH}"

      - name: Set up Node 22.11.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend package
        working-directory: backend
        run: mvn package -Dmaven.test.skip=true

      - name: Locate jar artifact
        id: jar
        run: |
          JAR_PATH="$(find backend/target -maxdepth 1 -name '*.jar' ! -name '*.original' | head -n 1)"
          if [ -z "${JAR_PATH}" ]; then
            echo "No packaged jar found under backend/target" >&2
            exit 1
          fi
          JAR_SHA256="$(sha256sum "${JAR_PATH}" | awk '{print $1}')"
          RELEASE_ID="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "path=${JAR_PATH}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${JAR_SHA256}" >> "${GITHUB_OUTPUT}"
          echo "release_id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-${{ steps.jar.outputs.release_id }}
          path: ${{ steps.jar.outputs.path }}
          retention-days: 14

      - name: Install SSH key
        env:
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${ECS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Upload jar to ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
        run: |
          SSH_PORT="${ECS_PORT:-22}"
          REMOTE_TMP="/opt/what-to-eat/backend/current/app.jar.github-actions.new"
          scp -P "${SSH_PORT}" -o StrictHostKeyChecking=no "${{ steps.jar.outputs.path }}" "${ECS_USER}@${ECS_HOST}:${REMOTE_TMP}"

      - name: Deploy release via remote script
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_PORT: ${{ secrets.ECS_PORT }}
        run: |
          SSH_PORT="${ECS_PORT:-22}"
          ssh -p "${SSH_PORT}" -o StrictHostKeyChecking=no "${ECS_USER}@${ECS_HOST}" \
            "APP_ROOT=/opt/what-to-eat/backend SERVICE_NAME=what-to-eat-backend bash -s -- deploy /opt/what-to-eat/backend/current/app.jar.github-actions.new ${{ steps.jar.outputs.release_id }} ${GITHUB_SHA} ${{ steps.jar.outputs.sha256 }}" \
            < ops/ecs/remote-release.sh

      - name: Deployment summary
        run: |
          {
            echo "### Backend deploy summary"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Ref: \`${{ inputs.git_ref }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Release ID: \`${{ steps.jar.outputs.release_id }}\`"
            echo "- Jar SHA256: \`${{ steps.jar.outputs.sha256 }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Smoke health checks
        run: |
          for attempt in $(seq 1 18); do
            ssh -p "${{ secrets.ECS_PORT || 22 }}" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" \
              "PUBLIC_BASE_URL=https://eat.868299.com LOCAL_BASE_URL=http://127.0.0.1:8081 SERVICE_NAME=what-to-eat-backend bash -s" \
              < ops/ecs/verify-backend.sh >/tmp/verify-backend.log 2>&1 && {
              cat /tmp/verify-backend.log
              echo "Smoke checks passed on attempt ${attempt}."
              exit 0
            }
            cat /tmp/verify-backend.log || true
            echo "Smoke checks failed on attempt ${attempt}; retrying..."
            sleep 10
          done
          echo "Smoke checks did not pass after retries." >&2
          exit 1
