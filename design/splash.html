<!DOCTYPE html>
<html><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1290px;height:2796px;overflow:hidden}
  .stage{
    width:1290px;height:2796px;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
    background:
      radial-gradient(58% 36% at 50% 40%, #FFFFFF 0%, transparent 60%),
      linear-gradient(168deg, #FFD9E6 0%, #E7DCFB 52%, #CFF1E8 100%);
  }
  /* 漂浮装饰泡泡 */
  .bub{position:absolute;border-radius:50%;opacity:.5}
  svg.dog{width:560px;height:560px;filter:drop-shadow(0 24px 34px rgba(90,78,99,.18))}
  .word{font-family:'ZCOOL KuaiLe',sans-serif;font-size:208px;line-height:1;
    background:linear-gradient(120deg,#FF8FB1,#B7A6F0 60%,#9AD0FF);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-top:10px}
  .cn{font-family:'ZCOOL KuaiLe',sans-serif;font-size:96px;color:#5A4E63;letter-spacing:12px;margin-top:6px}
  .tag{font-family:'Noto Sans SC',sans-serif;font-size:46px;color:#9A90A6;font-weight:500;letter-spacing:4px;margin-top:18px}
  .dot{position:absolute;bottom:150px;display:flex;gap:18px}
  .dot i{width:22px;height:22px;border-radius:50%;background:#FF8FB1;opacity:.55}
  .dot i:nth-child(2){background:#B7A6F0}
  .dot i:nth-child(3){background:#7FD8BE}
</style></head>
<body>
  <div class="stage">
    <div class="bub" style="width:240px;height:240px;background:#FFD98A;top:360px;left:150px"></div>
    <div class="bub" style="width:170px;height:170px;background:#9AD0FF;top:520px;right:170px"></div>
    <div class="bub" style="width:120px;height:120px;background:#7FD8BE;bottom:560px;left:230px"></div>
    <div class="bub" style="width:150px;height:150px;background:#FFB592;bottom:640px;right:210px"></div>

    <svg class="dog" viewBox="0 0 120 120">
      <ellipse cx="58" cy="107" rx="30" ry="6" fill="rgba(90,78,99,0.12)"/>
      <g transform="rotate(22 60 64)">
        <path d="M35 43c-13-2-21 9-20 26 1 9 6 14 12 12 6-3 8-12 9-23 .6-9 .5-14-1-15Z" fill="#463E52"/>
        <path d="M85 43c13-2 21 9 20 26-1 9-6 14-12 12-6-3-8-12-9-23-.6-9-.5-14 1-15Z" fill="#4C4357"/>
        <path d="M30 55C30 36 43 30 60 30s30 6 30 25c0 12-4 20-10 26-5 5-11 11-20 11s-15-6-20-11c-6-6-10-14-10-26Z" fill="#fff"/>
        <path d="M30 62l-6 1 5 3-6 2 6 2-4 3" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M90 62l6 1-5 3 6 2-6 2 4 3" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30 55C30 36 43 30 60 30s30 6 30 25l-5-4-4 5-5-4-4 5-5-4-4 5-4-5-4 5-5-4-4 5-5-4-4 5Z" fill="#4C4357"/>
        <path d="M60 32c5 10 5 24 1 35-1 2-2 2-3 0-4-11-3-25 2-35Z" fill="#fff"/>
        <ellipse cx="60" cy="79" rx="5" ry="3.8" fill="#3F3749"/>
        <path d="M60 82.8v3.6M51 89q9 3.5 18 0" stroke="#3F3749" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M47 80c-7 1-13 0-17-3M48 84c-7 2-13 3-18 1M73 80c7 1 13 0 17-3M72 84c7 2 13 3 18 1" stroke="#C8C0D2" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        <path d="M42 51l11 2" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M78 49l-11 3.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
        <ellipse cx="48" cy="62" rx="5.2" ry="4.9" fill="#fff" stroke="#3F3749" stroke-width="1.3"/>
        <ellipse cx="70" cy="60" rx="5.2" ry="4.9" fill="#fff" stroke="#3F3749" stroke-width="1.3"/>
        <path d="M43 60h10.4M65 58h10.4" stroke="#3F3749" stroke-width="3" stroke-linecap="round"/>
        <circle cx="51.4" cy="60" r="2.4" fill="#3F3749"/><circle cx="73.4" cy="58" r="2.4" fill="#3F3749"/>
        <ellipse cx="40" cy="71" rx="5" ry="3.2" fill="#FFD3E0"/><ellipse cx="80" cy="71" rx="5" ry="3.2" fill="#FFD3E0"/>
      </g>
    </svg>

    <div class="word">goaway</div>
    <div class="cn">狗啊喂</div>
    <div class="tag">把时间还给生活</div>

    <div class="dot"><i></i><i></i><i></i></div>
  </div>
</body></html>
