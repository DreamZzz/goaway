<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狗啊喂 · 运营后台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF7FB;--surface:#fff;--soft:#F4EDF7;--border:#EFE3F2;--text:#5A4E63;--muted:#9A90A6;
  --brand:#FF8FB1;--brand-soft:#FFE3EF;--mint:#7FD8BE;--mint-soft:#E3F7F0;--lav:#B7A6F0;
  --red:#E66A8A;--radius:16px;--shadow:0 10px 30px rgba(154,122,184,.10),0 2px 8px rgba(154,122,184,.06)
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;background:linear-gradient(180deg,#FFF7FB,#F4EDF7);color:var(--text);font-size:14px;line-height:1.55;min-height:100vh}
header{position:sticky;top:0;z-index:20;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(255,247,251,.95);backdrop-filter:blur(14px);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:18px;font-weight:800;color:var(--brand)}
header .sub{font-size:12px;color:var(--muted)}
.shell{max-width:1100px;margin:0 auto;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input,select{padding:9px 11px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;color:var(--text);font-family:inherit}
input[type=number]{width:110px}
label.fld{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
.btn{padding:9px 15px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:700;cursor:pointer}
.btn:hover{opacity:.9}.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-mint{background:var(--mint);color:#fff;border-color:var(--mint)}
.btn-danger{background:#fff0f4;color:var(--red);border-color:#ffd6e2}
.btn-sm{padding:6px 10px;font-size:12px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:9px 18px;border-radius:999px;background:#fff;border:1px solid var(--border);cursor:pointer;font-weight:700;font-size:13px}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;background:#fff}
.item .grow{flex:1;min-width:0}
.item .t{font-weight:700}
.item .d{font-size:12px;color:var(--muted)}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
.pill.on{background:var(--mint-soft);color:#2a9d7f}
.pill.off{background:var(--soft);color:var(--muted)}
.cond{border:1px dashed var(--border);border-radius:12px;padding:12px;margin-bottom:8px;background:var(--bg)}
.muted{color:var(--muted);font-size:12px}
.sql{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:var(--soft);padding:8px 10px;border-radius:8px;color:#6b5b78;word-break:break-all}
.hidden{display:none}
h2{font-size:15px;font-weight:800;margin-bottom:12px}
.sep{height:1px;background:var(--border);margin:14px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:.96}
</style>
</head>
<body>
<header>
  <h1>狗啊喂 · 运营后台</h1>
  <span class="sub">勋章 / 榜单 规则配置</span>
  <span style="flex:1"></span>
  <input id="secret" type="password" placeholder="X-Admin-Secret" style="width:200px">
  <button class="btn btn-primary" onclick="connect()">连接</button>
  <span id="conn" class="sub"></span>
</header>

<div class="shell">
  <div class="tabs">
    <div class="tab active" id="tab-badge" onclick="switchTab('badge')">勋章</div>
    <div class="tab" id="tab-board" onclick="switchTab('board')">榜单</div>
  </div>

  <!-- 勋章 -->
  <div id="panel-badge">
    <div class="card">
      <h2 id="badgeFormTitle">新建勋章</h2>
      <div class="row">
        <label class="fld">key（英文唯一）<input id="b_key" placeholder="water_master"></label>
        <label class="fld">名称<input id="b_title" placeholder="水逆体质"></label>
        <label class="fld">类别<select id="b_kind"></select></label>
        <label class="fld">图标<select id="b_icon"></select></label>
      </div>
      <label class="fld" style="margin-top:8px">描述<input id="b_desc" placeholder="累计喝水满 200 杯" style="width:360px"></label>
      <div class="sep"></div>
      <div class="row"><strong>达成条件</strong>
        <select id="b_logic"><option value="AND">且(AND)</option><option value="OR">或(OR)</option></select>
        <button class="btn btn-sm" onclick="addCond('b_conds')">+ 条件</button>
        <span class="muted">1–3 个条件</span>
      </div>
      <div id="b_conds" style="margin-top:8px"></div>
      <div class="row" style="margin-top:8px">
        <button class="btn btn-mint btn-sm" onclick="validateBadge()">校验</button>
        <span id="b_sql" class="sql" style="flex:1"></span>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn btn-primary" onclick="saveBadge()">保存勋章</button>
        <button class="btn btn-sm" onclick="resetBadgeForm()">清空</button>
        <input type="hidden" id="b_id">
      </div>
    </div>
    <div class="card"><h2>已配置勋章</h2><div id="badgeList"></div></div>
  </div>

  <!-- 榜单 -->
  <div id="panel-board" class="hidden">
    <div class="card">
      <h2 id="boardFormTitle">新建榜单</h2>
      <div class="row">
        <label class="fld">key（英文唯一）<input id="l_key" placeholder="hydration_board"></label>
        <label class="fld">名称<input id="l_title" placeholder="喝水榜"></label>
        <label class="fld">单位<select id="l_unit"><option value="count">次数</option><option value="seconds">时长</option></select></label>
        <label class="fld">默认周期<select id="l_period"><option value="week">本周</option><option value="day">今日</option></select></label>
      </div>
      <div class="sep"></div>
      <div class="row"><strong>打分公式</strong><span class="muted">指标 [运算 指标/常量]，按从左到右</span></div>
      <div id="l_terms" style="margin-top:8px"></div>
      <button class="btn btn-sm" onclick="addTerm()">+ 项</button>
      <div class="sep"></div>
      <div class="row"><strong>可选过滤（HAVING）</strong>
        <select id="l_logic"><option value="AND">且(AND)</option><option value="OR">或(OR)</option></select>
        <button class="btn btn-sm" onclick="addCond('l_conds')">+ 条件</button>
        <span class="muted">不加则全员上榜</span>
      </div>
      <div id="l_conds" style="margin-top:8px"></div>
      <div class="row" style="margin-top:8px">
        <button class="btn btn-mint btn-sm" onclick="validateBoard()">校验</button>
        <span id="l_sql" class="sql" style="flex:1"></span>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn btn-primary" onclick="saveBoard()">保存榜单</button>
        <button class="btn btn-sm" onclick="resetBoardForm()">清空</button>
        <input type="hidden" id="l_id">
      </div>
    </div>
    <div class="card"><h2>已配置榜单</h2><div id="boardList"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let META = null;
const $ = id => document.getElementById(id);
const secret = () => $('secret').value.trim();

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function api(path, method='GET', body){
  const res = await fetch('/admin'+path, {
    method,
    headers:{'Content-Type':'application/json','X-Admin-Secret':secret()},
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok){ let m=res.status; try{m=(await res.json()).message||m;}catch(e){} throw new Error(m); }
  return res.status===204 ? null : res.json();
}

function switchTab(t){
  $('tab-badge').classList.toggle('active', t==='badge');
  $('tab-board').classList.toggle('active', t==='board');
  $('panel-badge').classList.toggle('hidden', t!=='badge');
  $('panel-board').classList.toggle('hidden', t!=='board');
}

async function connect(){
  try{
    localStorage.setItem('goaway_admin_secret', secret());
    META = await api('/meta');
    fillMeta();
    $('conn').textContent = '已连接 ✓';
    await Promise.all([loadBadges(), loadBoards()]);
    addCond('b_conds'); addTerm();
  }catch(e){ $('conn').textContent='连接失败: '+e.message; toast('连接失败: '+e.message); }
}

function fillMeta(){
  $('b_kind').innerHTML = META.badgeKinds.map(k=>`<option value="${k}">${k==='SINGLE'?'单次':'累计'}</option>`).join('');
  $('b_icon').innerHTML = META.icons.map(i=>`<option value="${i}">${i}</option>`).join('');
}

function metricOptions(sel){
  return META.metrics.map(m=>`<option value="${m.key}">${m.label}（${m.key}）</option>`).join('');
}

// ── 条件行（勋章规则 / 榜单 HAVING 共用）──
function addCond(containerId){
  const c = $(containerId);
  if(c.children.length>=3){ toast('最多 3 个条件'); return; }
  const div = document.createElement('div');
  div.className='cond';
  div.innerHTML = `
    <div class="row">
      <select class="c-metric">${metricOptions()}</select>
      <select class="c-aop"><option value="">（不运算）</option>${META.arithOps.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>
      <input class="c-anum" type="number" placeholder="数" style="width:80px">
      <select class="c-cmp">${META.compareOps.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>
      <input class="c-th" type="number" placeholder="阈值">
      <label class="row" style="gap:4px"><input type="checkbox" class="c-neg">非</label>
      <button class="btn btn-sm btn-danger" onclick="this.closest('.cond').remove()">删</button>
    </div>`;
  c.appendChild(div);
}

function readConds(containerId){
  return [...$(containerId).querySelectorAll('.cond')].map(row=>{
    const metric = row.querySelector('.c-metric').value;
    const aop = row.querySelector('.c-aop').value;
    const anum = row.querySelector('.c-anum').value;
    let left = {type:'metric', metric};
    if(aop){ left = {type:'arith', op:aop, left:{type:'metric',metric}, right:{type:'const',value:Number(anum||0)}}; }
    return {
      left,
      cmp: row.querySelector('.c-cmp').value,
      right: {type:'const', value:Number(row.querySelector('.c-th').value||0)},
      negate: row.querySelector('.c-neg').checked
    };
  });
}

// ── 榜单打分公式项 ──
function addTerm(){
  const c = $('l_terms');
  if(c.children.length>=3){ toast('最多 3 项'); return; }
  const first = c.children.length===0;
  const div = document.createElement('div');
  div.className='cond';
  div.innerHTML = `
    <div class="row">
      ${first?'<span class="muted" style="width:54px">起始</span>':`<select class="t-op">${META.arithOps.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`}
      <select class="t-kind"><option value="metric">指标</option><option value="const">常量</option></select>
      <select class="t-metric">${metricOptions()}</select>
      <input class="t-num" type="number" placeholder="常量" style="width:90px;display:none">
      <button class="btn btn-sm btn-danger" onclick="this.closest('.cond').remove()">删</button>
    </div>`;
  div.querySelector('.t-kind').onchange = e=>{
    const m=div.querySelector('.t-metric'), n=div.querySelector('.t-num');
    const isM=e.target.value==='metric'; m.style.display=isM?'':'none'; n.style.display=isM?'none':'';
  };
  c.appendChild(div);
}

function termExpr(row){
  if(row.querySelector('.t-kind').value==='const'){ return {type:'const', value:Number(row.querySelector('.t-num').value||0)}; }
  return {type:'metric', metric:row.querySelector('.t-metric').value};
}

function buildScoreExpr(){
  const rows=[...$('l_terms').querySelectorAll('.cond')];
  if(rows.length===0) throw new Error('请至少添加 1 项打分');
  let acc = termExpr(rows[0]);
  for(let i=1;i<rows.length;i++){
    const op = rows[i].querySelector('.t-op').value;
    acc = {type:'arith', op, left:acc, right:termExpr(rows[i])};
  }
  return acc;
}

// ── 勋章 ──
async function loadBadges(){
  const list = await api('/badges');
  $('badgeList').innerHTML = list.length? list.map(b=>`
    <div class="item">
      <div class="grow"><div class="t">${b.title} <span class="muted">(${b.key})</span></div>
        <div class="d">${b.description||''} · ${b.kind==='SINGLE'?'单次':'累计'}</div></div>
      <span class="pill ${b.enabled?'on':'off'}">${b.enabled?'启用':'停用'}</span>
      <button class="btn btn-sm" onclick='editBadge(${JSON.stringify(b)})'>编辑</button>
      <button class="btn btn-sm" onclick="toggleBadge(${b.id})">${b.enabled?'停用':'启用'}</button>
      <button class="btn btn-sm btn-danger" onclick="delBadge(${b.id})">删</button>
    </div>`).join('') : '<div class="muted">暂无配置勋章</div>';
}
function badgeRule(){ return {logic:$('b_logic').value, conditions:readConds('b_conds')}; }
async function validateBadge(){
  try{ const r=await api('/rules/validate','POST',{kind:'rule',payload:badgeRule()});
    $('b_sql').textContent = r.valid? ('HAVING/判定: '+r.sql) : ('✗ '+r.error);
  }catch(e){ toast(e.message); }
}
async function saveBadge(){
  try{
    const id=$('b_id').value;
    const body={key:$('b_key').value.trim(),title:$('b_title').value.trim(),description:$('b_desc').value.trim(),
      icon:$('b_icon').value,kind:$('b_kind').value,rule:badgeRule(),enabled:true};
    await api(id?`/badges/${id}`:'/badges', id?'PUT':'POST', body);
    toast('已保存'); resetBadgeForm(); loadBadges();
  }catch(e){ toast('保存失败: '+e.message); }
}
function editBadge(b){
  $('badgeFormTitle').textContent='编辑勋章'; $('b_id').value=b.id;
  $('b_key').value=b.key; $('b_key').disabled=true; $('b_title').value=b.title;
  $('b_desc').value=b.description||''; $('b_kind').value=b.kind||'CUMULATIVE'; $('b_icon').value=b.icon||'trophy';
  const rule=JSON.parse(b.ruleJson); $('b_logic').value=rule.logic||'AND';
  $('b_conds').innerHTML=''; (rule.conditions||[]).forEach(c=>{ addCond('b_conds'); fillCond($('b_conds').lastElementChild,c); });
  window.scrollTo(0,0);
}
function resetBadgeForm(){
  $('badgeFormTitle').textContent='新建勋章'; $('b_id').value=''; $('b_key').disabled=false;
  ['b_key','b_title','b_desc'].forEach(i=>$(i).value=''); $('b_sql').textContent='';
  $('b_conds').innerHTML=''; addCond('b_conds');
}
async function toggleBadge(id){ try{ await api(`/badges/${id}/toggle`,'POST'); loadBadges(); }catch(e){toast(e.message);} }
async function delBadge(id){ if(!confirm('删除该勋章配置？'))return; try{ await api(`/badges/${id}`,'DELETE'); loadBadges(); }catch(e){toast(e.message);} }

function fillCond(row, c){
  // c.left 可能是 metric 或 arith(metric op const)
  let metric=c.left.metric, aop='', anum='';
  if(c.left.type==='arith'){ metric=c.left.left.metric; aop=c.left.op; anum=c.left.right.value; }
  row.querySelector('.c-metric').value=metric;
  row.querySelector('.c-aop').value=aop; row.querySelector('.c-anum').value=anum;
  row.querySelector('.c-cmp').value=c.cmp; row.querySelector('.c-th').value=c.right.value;
  row.querySelector('.c-neg').checked=!!c.negate;
}

// ── 榜单 ──
async function loadBoards(){
  const list = await api('/leaderboards');
  $('boardList').innerHTML = list.length? list.map(b=>`
    <div class="item">
      <div class="grow"><div class="t">${b.title} <span class="muted">(${b.key})</span></div>
        <div class="d">单位 ${b.unit} · 默认 ${b.periodDefault}</div></div>
      <span class="pill ${b.enabled?'on':'off'}">${b.enabled?'启用':'停用'}</span>
      <button class="btn btn-sm" onclick='editBoard(${JSON.stringify(b)})'>编辑</button>
      <button class="btn btn-sm" onclick="toggleBoard(${b.id})">${b.enabled?'停用':'启用'}</button>
      <button class="btn btn-sm btn-danger" onclick="delBoard(${b.id})">删</button>
    </div>`).join('') : '<div class="muted">暂无配置榜单</div>';
}
function boardHaving(){ const cs=readConds('l_conds'); return cs.length? {logic:$('l_logic').value,conditions:cs} : null; }
async function validateBoard(){
  try{ const r=await api('/rules/validate','POST',{kind:'expr',payload:buildScoreExpr()});
    $('l_sql').textContent = r.valid? ('score = '+r.sql) : ('✗ '+r.error);
  }catch(e){ toast(e.message); }
}
async function saveBoard(){
  try{
    const id=$('l_id').value;
    const body={key:$('l_key').value.trim(),title:$('l_title').value.trim(),unit:$('l_unit').value,
      periodDefault:$('l_period').value,scoreExpr:buildScoreExpr(),having:boardHaving(),enabled:true};
    await api(id?`/leaderboards/${id}`:'/leaderboards', id?'PUT':'POST', body);
    toast('已保存'); resetBoardForm(); loadBoards();
  }catch(e){ toast('保存失败: '+e.message); }
}
function editBoard(b){
  $('boardFormTitle').textContent='编辑榜单'; $('l_id').value=b.id;
  $('l_key').value=b.key; $('l_key').disabled=true; $('l_title').value=b.title;
  $('l_unit').value=b.unit||'count'; $('l_period').value=b.periodDefault||'week';
  $('l_terms').innerHTML=''; rebuildTerms(JSON.parse(b.scoreExprJson));
  $('l_conds').innerHTML='';
  if(b.havingRuleJson){ const r=JSON.parse(b.havingRuleJson); $('l_logic').value=r.logic||'AND';
    (r.conditions||[]).forEach(c=>{ addCond('l_conds'); fillCond($('l_conds').lastElementChild,c); }); }
  window.scrollTo(0,0);
}
function rebuildTerms(expr){
  // 把左结合的 arith 链拆回项序列
  const terms=[]; (function walk(e){ if(e.type==='arith'){ walk(e.left); terms.push({op:e.op, node:e.right}); } else { terms.push({op:null, node:e}); } })(expr);
  terms.forEach((t,i)=>{ addTerm(); const row=$('l_terms').lastElementChild;
    if(i>0) row.querySelector('.t-op').value=t.op;
    const kind=t.node.type; row.querySelector('.t-kind').value=kind;
    const m=row.querySelector('.t-metric'),n=row.querySelector('.t-num');
    if(kind==='const'){ m.style.display='none'; n.style.display=''; n.value=t.node.value; }
    else { m.value=t.node.metric; }
  });
}
function resetBoardForm(){
  $('boardFormTitle').textContent='新建榜单'; $('l_id').value=''; $('l_key').disabled=false;
  ['l_key','l_title'].forEach(i=>$(i).value=''); $('l_sql').textContent='';
  $('l_terms').innerHTML=''; addTerm(); $('l_conds').innerHTML='';
}
async function toggleBoard(id){ try{ await api(`/leaderboards/${id}/toggle`,'POST'); loadBoards(); }catch(e){toast(e.message);} }
async function delBoard(id){ if(!confirm('删除该榜单配置？'))return; try{ await api(`/leaderboards/${id}`,'DELETE'); loadBoards(); }catch(e){toast(e.message);} }

// 自动回填密钥
window.addEventListener('DOMContentLoaded',()=>{ const s=localStorage.getItem('goaway_admin_secret'); if(s){ $('secret').value=s; connect(); } });
</script>
</body>
</html>
