# Server Configuration
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goaway_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secure_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:50MB}
app.upload-dir=${APP_UPLOAD_DIR:uploads/images/}
app.media.storage.provider=${APP_MEDIA_STORAGE_PROVIDER:local}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:your-jwt-secret-key-change-in-production}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:2592000000}

# Auth Configuration
app.auth.rate-limit.max-requests=${APP_AUTH_RATE_LIMIT_MAX_REQUESTS:20}
app.auth.rate-limit.window-seconds=${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:300}
app.auth.max-failed-password-attempts=${APP_AUTH_MAX_FAILED_PASSWORD_ATTEMPTS:3}
app.auth.captcha-ttl-seconds=${APP_AUTH_CAPTCHA_TTL_SECONDS:300}
app.auth.verification-code-ttl-seconds=${APP_AUTH_VERIFICATION_CODE_TTL_SECONDS:600}
app.auth.verification-code-cooldown-seconds=${APP_AUTH_VERIFICATION_CODE_COOLDOWN_SECONDS:60}
app.auth.sms.provider=${APP_AUTH_SMS_PROVIDER:log}
app.auth.sms.aliyun.sign-name=${APP_AUTH_SMS_ALIYUN_SIGN_NAME:}
app.auth.sms.aliyun.login-template-code=${APP_AUTH_SMS_ALIYUN_LOGIN_TEMPLATE_CODE:}
app.auth.sms.aliyun.access-key-id=${APP_AUTH_SMS_ALIYUN_ACCESS_KEY_ID:${ALIYUN_SMS_ACCESS_KEY_ID:${ALIBABA_CLOUD_ACCESS_KEY_ID:}}}
app.auth.sms.aliyun.access-key-secret=${APP_AUTH_SMS_ALIYUN_ACCESS_KEY_SECRET:${ALIYUN_SMS_ACCESS_KEY_SECRET:${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}}}
app.auth.sms.aliyun.endpoint=${APP_AUTH_SMS_ALIYUN_ENDPOINT:${ALIYUN_SMS_ENDPOINT:dysmsapi.aliyuncs.com}}
app.auth.password-reset.provider=${APP_AUTH_PASSWORD_RESET_PROVIDER:log}
app.auth.password-reset.email-subject=${APP_AUTH_PASSWORD_RESET_EMAIL_SUBJECT:}
app.apple.bundle-id=${APP_APPLE_BUNDLE_ID:com.goaway.app}
app.demo.test-login.enabled=${APP_DEMO_TEST_LOGIN_ENABLED:true}
app.demo.test-login.username=${APP_DEMO_TEST_LOGIN_USERNAME:demo_guest}
app.demo.test-login.display-name=${APP_DEMO_TEST_LOGIN_DISPLAY_NAME:Demo Guest}
app.demo.test-login.email=${APP_DEMO_TEST_LOGIN_EMAIL:demo-guest@example.com}
app.demo.test-login.phone=${APP_DEMO_TEST_LOGIN_PHONE:}
app.demo.test-login.bio=${APP_DEMO_TEST_LOGIN_BIO:Test mode account for product demos}
app.demo.test-login.region=${APP_DEMO_TEST_LOGIN_REGION:Demo}
app.guest.token-expiration-ms=${APP_GUEST_TOKEN_EXPIRATION_MS:604800000}
app.guest.install-id-salt=${APP_GUEST_INSTALL_ID_SALT:${APP_JWT_SECRET}}
app.guest.ip-hash-salt=${APP_GUEST_IP_HASH_SALT:${APP_JWT_SECRET}}
app.guest.trial-limit=${APP_GUEST_TRIAL_LIMIT:3}
app.guest.auth.rate-limit.max-requests=${APP_GUEST_AUTH_RATE_LIMIT_MAX_REQUESTS:5}
app.guest.auth.rate-limit.window-seconds=${APP_GUEST_AUTH_RATE_LIMIT_WINDOW_SECONDS:600}

# LLM Provider Configuration (used by weekly-report / mood scenes via LlmSceneConfig)
app.llm.provider=${APP_LLM_PROVIDER:mock}
app.llm.openai.base-url=${APP_LLM_OPENAI_BASE_URL:https://api.openai.com}
app.llm.openai.api-key=${APP_LLM_OPENAI_API_KEY:}
app.llm.openai.chat-model=${APP_LLM_OPENAI_CHAT_MODEL:${APP_LLM_OPENAI_TEXT_MODEL:gpt-4o-mini}}
app.llm.openai.fallback-chat-model=${APP_LLM_OPENAI_FALLBACK_CHAT_MODEL:}
app.llm.openai.timeout-ms=${APP_LLM_OPENAI_TIMEOUT_MS:60000}
app.llm.openai.fallback-timeout-ms=${APP_LLM_OPENAI_FALLBACK_TIMEOUT_MS:75000}
app.llm.openai.streaming-timeout-ms=${APP_LLM_OPENAI_STREAMING_TIMEOUT_MS:90000}

# Push Provider Configuration (reminders: water / sedentary / off-work)
app.push.provider=${APP_PUSH_PROVIDER:log}

# Content Moderation Provider (mood "æ ‘æ´ž" posts)
app.moderation.provider=${APP_MODERATION_PROVIDER:passthrough}

# Admin API secret (required for /admin/* endpoints)
app.admin.secret=${APP_ADMIN_SECRET:}
app.admin.rate-limit.max-requests=${APP_ADMIN_RATE_LIMIT_MAX_REQUESTS:10}
app.admin.rate-limit.window-seconds=${APP_ADMIN_RATE_LIMIT_WINDOW_SECONDS:60}

# Analytics Provider Configuration
app.analytics.provider=${APP_ANALYTICS_PROVIDER:log}
app.analytics.umeng.app-key=${APP_ANALYTICS_UMENG_APP_KEY:}
app.analytics.umeng.app-master-secret=${APP_ANALYTICS_UMENG_APP_MASTER_SECRET:}

# CORS Configuration (for React Native development)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Actuator / Health Check
# Only expose the health endpoint publicly; no sensitive component details
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Mail health check is disabled â€” SMTP is optional (password-reset only) and unset locally/by default
management.health.mail.enabled=false

# Logging Configuration
logging.level.com.goaway=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${APP_SECURITY_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{HH:mm:ss.SSS} %5p [%X{requestId:-no-rid}] %-40.40logger{39} : %m%n

# Aliyun OSS Configuration
aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
aliyun.oss.access-key-id=${ALIYUN_OSS_ACCESS_KEY_ID:}
aliyun.oss.access-key-secret=${ALIYUN_OSS_ACCESS_KEY_SECRET:}
aliyun.oss.bucket-name=${ALIYUN_OSS_BUCKET_NAME:goaway-media}
#aliyun.oss.cdn-domain=${ALIYUN_OSS_CDN_DOMAIN}
aliyun.oss.folder=uploads/

# Image compression configuration
app.image.compression.max-width=1200
app.image.compression.max-height=1200
app.image.compression.quality=0.8
app.image.compression.enabled=true

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
app.mail.from-address=${APP_MAIL_FROM_ADDRESS:${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}}
app.mail.from-name=${APP_MAIL_FROM_NAME:goaway}
app.mail.reply-to=${APP_MAIL_REPLY_TO:}
